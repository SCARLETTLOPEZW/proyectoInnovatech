name: Backend CI

on:
  push:
    paths:
      - "back-Despachos_SpringBoot/**"
      - "back-Ventas_SpringBoot/**"

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Construir imagen Backend Despachos
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/back-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Publicar imagen Backend Despachos
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/back-despachos:latest

      - name: Construir imagen Backend Ventas
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/back-Ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Publicar imagen Backend Ventas
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/back-Ventas:latest