name: CI/CD Pipeline Semestral

on:
  push:
    branches: [ "main" ] # Se ejecuta automáticamente al subir cambios a la rama main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Compilar y subir Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/front-despacho:latest ./front_despacho
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/front-despacho:latest

      - name: Compilar y subir Backend Despachos
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/back-despachos:latest ./back-Despachos_SpringBoot/SpringBoot-API-REST-DESPACHO
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/back-despachos:latest

      - name: Compilar y subir Backend Ventas
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/back-ventas:latest ./back-Ventas_SpringBoot/SpringBoot-API-REST
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/back-ventas:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Conectarse a AWS EC2 via SSH y actualizar servicios
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ubuntu # Cambiar por ec2-user si tu instancia usa Amazon Linux
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/proyecto # Cambia esta ruta por la carpeta real en tu servidor AWS
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans

